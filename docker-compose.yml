services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: wisebox-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wisebox

  nginx:
    image: nginx:alpine
    container_name: wisebox-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - wisebox

  mysql:
    image: mysql:8
    container_name: wisebox-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: wisebox
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: wisebox
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wisebox

  mailpit:
    image: axllent/mailpit
    container_name: wisebox-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - wisebox

  redis:
    image: redis:7-alpine
    container_name: wisebox-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wisebox

volumes:
  mysql_data:
    driver: local

networks:
  wisebox:
    driver: bridge
