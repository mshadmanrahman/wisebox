name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Start Docker services and wait for healthy
        run: |
          docker compose up -d --build --wait
          docker compose ps

      - name: Prepare backend dependencies
        run: |
          cp backend/.env.example backend/.env
          docker compose exec -T -u root app chown -R www:www /var/www/html
          docker compose exec -T app composer install --no-interaction --prefer-dist --no-progress
          docker compose exec -T app php artisan key:generate --force

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Playwright browser
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Run validation matrix
        run: ./scripts/validate.sh --with-e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

      - name: Shutdown Docker services
        if: always()
        run: docker compose down -v
