# Railway Railpack configuration for Wisebox backend
# PHP version and extensions are declared in composer.json require section
# Railpack auto-installs them via install-php-extensions

[start]
cmd = "echo '>>> config:clear' && php artisan config:clear && echo '>>> storage:link' && php artisan storage:link --force && echo '>>> migrate:fresh' && php artisan migrate:fresh --force --seed && echo '>>> view:clear' && php artisan view:clear && echo '>>> Starting server' && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
