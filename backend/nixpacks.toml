# Railway Railpack configuration for Wisebox backend
# PHP version and extensions are declared in composer.json require section
# Railpack auto-installs them via install-php-extensions
#
# Railpacks detects Laravel and handles: migrate, storage:link,
# config/route/view caching, FrankenPHP + Caddy.
# We add db:seed for admin user bootstrapping (idempotent via updateOrCreate).

[start]
cmd = "php artisan db:seed --force"
